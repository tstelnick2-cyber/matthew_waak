kind = "web"
previewPath = "/"
title = "Matthew Waak"
version = "1.0.0"
id = "artifacts/matthew-waak"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20266

[services.development]
run = "pnpm --filter @workspace/matthew-waak run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/matthew-waak", "run", "build" ]
publicDir = "artifacts/matthew-waak/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20266"
BASE_PATH = "/"
